<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#272736" />
    <title>Osteps is offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        align-items: center;
        background:
          radial-gradient(circle at top, #dff3e7, transparent 42%),
          #eef9f2;
        color: #0f172a;
        display: flex;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 24px;
      }
      main {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid #b9e2cd;
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        max-width: 440px;
        padding: 32px;
        text-align: center;
        width: 100%;
      }
      img {
        height: 88px;
        margin-bottom: 18px;
        width: 88px;
      }
      h1 {
        font-size: 24px;
        margin: 0;
      }
      p {
        color: #475569;
        line-height: 1.6;
        margin: 12px 0 24px;
      }
      button {
        background: #38c16c;
        border: 0;
        border-radius: 14px;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        padding: 12px 20px;
      }
      button:focus-visible {
        outline: 3px solid rgba(56, 193, 108, 0.35);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/osteps-192.png" alt="Osteps" />
      <h1>You are offline</h1>
      <p>
        Osteps needs an internet connection for live school information and
        saved changes. Reconnect, then try again.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
